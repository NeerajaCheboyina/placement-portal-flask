{% extends "base.html" %}

{% block content %}

<div class="form-container">

<h2>Login</h2>

<form method="POST">

<div class="mb-3">
<input type="email" name="email" class="form-control" placeholder="Email" required>
</div>

<div class="mb-3">
<input type="password" name="password" class="form-control" placeholder="Password" required>
</div>

<button type="submit" class="btn btn-primary w-100">
Login
</button>

</form>

<hr>

<p class="text-center mt-3">New user?</p>

<div class="d-grid gap-2">

<a href="{{ url_for('student_register') }}" class="btn btn-outline-success">
Register as Student
</a>

<a href="{{ url_for('company_register') }}" class="btn btn-outline-primary">
Register as Company
</a>

</div>

</div>

{% endblock %}
